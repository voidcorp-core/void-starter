title = "void-starter gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Repo-level allowlist for placeholders that look like secrets in docs"
paths = [
  '''docs/.*\.md$''',
  '''CLAUDE\.md$''',
  '''README\.md$''',
  '''context\.md$''',
  '''starter-plan\.md$''',
]
regexes = [
  '''EXAMPLE_API_KEY''',
  '''YOUR_DSN_HERE''',
  '''SENTRY_DSN''',
  '''GOOGLE_CLIENT_(ID|SECRET)''',
  '''BETTER_AUTH_SECRET''',
  '''NEXT_PUBLIC_POSTHOG_KEY''',
]

[[allowlists]]
description = "Build artifacts (gitignored): Next.js auto-generates per-build preview/encryption keys under .next/. These never enter git history; the allowlist keeps `gitleaks detect --no-git` from flagging them."
paths = [
  '''(^|/)\.next/''',
  '''(^|/)\.turbo/''',
  '''(^|/)node_modules/''',
  '''(^|/)dist/''',
  '''(^|/)\.vercel/''',
  '''(^|/)playwright-report/''',
  '''(^|/)test-results/''',
]
